name: Sync RockZone content

on:
  schedule:
    - cron: '15 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rockzone-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.ROCKZONE_SYNC_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Import RockZone articles
        run: python import_rockzone.py --save

      - name: Rebuild generated data
        run: python build.py

      - name: Commit and push changes
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No content updates found."
            exit 0
          fi

          git add data public/data.json cover_cache.json
          git commit -m "chore: sync RockZone content"
          git push origin HEAD:main
